<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect The Dots</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main>
        <div id="title_container">
            <h1 id="title">Connect The Dots</h1>
        </div>
        <div class="demo_container">
            <div class="demo_wrapper">
                <canvas id="canvas"></canvas>
                <div class="controls">
                    <div class="menu_row" style="outline: 1px solid white;">
                        <button id="clear">Clear</button>

                        <button id="render">Re-render</button>
                    </div>
                    <div class="menu_row">
                        <button id="linear">Linear</button>
                        <button id="polynomial">Polynomial</button>
                        <button id="">--</button>
                    </div>
                </div>

                
            </div>
        </div>

        <div class="desc">
            <!-- general info here -->
        </div>
    </main>


    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./scripts/App.js"></script>
    <script type="module" src="./scripts/Renderer.js"></script>
    <script type="module" src="./scripts/Input.js"></script>

    <script type="module" src="./scripts/Compute.js"></script>
